<!DOCTYPE html>
<html>
<head>
    <title>Geofences Stagging Simulation</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        body { margin:0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        #map { height:100vh; width:100%; }
        
        /* Floating Info Box */
        .info-box {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 1000;
            width: 240px; border-left: 5px solid #2c3e50;
        }

        .unit-title { font-size: 16px; font-weight: 800; color: #2c3e50; margin-bottom: 5px; display: block; }
        .mode-tag { font-size: 10px; background: #3498db; color: white; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; }
        
        hr { border: 0; border-top: 1px solid #eee; margin: 15px 0; }

        /* Status Indicator */
        .status-container { display: flex; align-items: center; gap: 10px; }
        .status-dot { 
            height: 14px; width: 14px; border-radius: 50%; 
            transition: all 0.3s ease;
        }
        
        .bg-green { background-color: #27ae60; box-shadow: 0 0 10px rgba(39, 174, 96, 0.6); }
        .bg-red { background-color: #e74c3c; box-shadow: 0 0 15px rgba(231, 76, 60, 0.8); animation: pulse-red 0.8s infinite; }
        
        .status-text { font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
        .text-green { color: #27ae60; }
        .text-red { color: #e74c3c; }

        /* Animations */
        @keyframes pulse-red {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes blink-area {
            0% { fill-opacity: 0.1; stroke-width: 3; }
            50% { fill-opacity: 0.5; stroke-width: 6; }
            100% { fill-opacity: 0.1; stroke-width: 3; }
        }

        .blink-polygon { 
            animation: blink-area 0.8s infinite !important; 
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="info-box">
    <span class="unit-title">EA-8596 (Descon)</span>
    <span class="mode-tag">Live Simulation</span>
    <hr>
    <div class="status-container">
        <div id="dot" class="status-dot bg-green"></div>
        <div id="status-label" class="status-text text-green">Inside Area</div>
    </div>
    <div style="margin-top: 10px; font-size: 11px; color: #666;">
        Lat: <span id="lat-val">-</span><br>
        Lng: <span id="lng-val">-</span>
    </div>
</div>

<script>
    $(document).ready(function(){
    // Madina Initial Position
    var map = L.map('map', { zoomControl: false }).setView([24.492993, 39.65313], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.control.zoom({ position: 'bottomleft' }).addTo(map);

    // Geofence Design
    var geofenceCoords = [
        [24.510, 39.640], [24.515, 39.660], [24.505, 39.680], 
        [24.485, 39.675], [24.475, 39.655], [24.480, 39.635], [24.495, 39.630]
    ];
    
    var polyLayer = L.polygon(geofenceCoords, {
        color: '#2c3e50', fillColor: '#2c3e50', weight: 3, fillOpacity: 0.1
    }).addTo(map);

    // Marker (Initially hidden or at start)
    var liveMarker = L.circleMarker([0,0], {
        radius: 10, color: '#fff', weight: 2, fillColor: '#3498db', fillOpacity: 1
    }).addTo(map);

    // Ray-casting algorithm
    function isInside(lat, lng, poly) {
        var x = lat, y = lng;
        var vs = poly.getLatLngs()[0];
        var inside = false;
        for (var i = 0, j = vs.length - 1; i < vs.length; j = i++) {
            var xi = vs[i].lat, yi = vs[i].lng;
            var xj = vs[j].lat, yj = vs[j].lng;
            var intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
            if (intersect) inside = !inside;
        }
        return inside;
    }

    // --- REAL API FETCH LOGIC ---
    var mySid = "513609c7ed9fe4a2cf01c5212c168e72"; // Replace with your valid SID

    function updateFromRealAPI() {
    $.ajax({
        //url: 'https://localhost:7131/api/Wialon/get-units',
        url: 'https://blindapi.tagntech.com/api/Wialon/get-units',
        type: 'GET',
        data: { sid: mySid },
        success: function(apiResponse) {
            // Logic as per your JSON: apiResponse -> data -> items
            if(apiResponse.success && apiResponse.data && apiResponse.data.items) {
                
                var items = apiResponse.data.items;
                
                // Exact name match check kar rahe hain
                var unit = items.find(u => u.nm === "EA-8596 (Descon)");
                
                if(unit && unit.pos) {
                    // Wialon Response Check:
                    // y = Latitude (24.492993)
                    // x = Longitude (39.65313)
                    var lat = unit.pos.y;
                    var lng = unit.pos.x;
                    
                    console.log("Unit Found! Moving to:", lat, lng);
                    updateMarkerUI(lat, lng);
                } else {
                    console.warn("Unit 'EA-8596 (Descon)' nahi mila. Items check karein.");
                }
            }
        },
        error: function(err) { 
            console.error("API Connection Error. Check if .NET is running and CORS is enabled."); 
        }
    });
    }
    function updateMarkerUI(lat, lng) {
        var newPos = [lat, lng];
        liveMarker.setLatLng(newPos);
        
        $("#lat-val").text(lat.toFixed(6));
        $("#lng-val").text(lng.toFixed(6));

        var statusLabel = $("#status-label");
        var dot = $("#dot");

        if (isInside(lat, lng, polyLayer)) {
            dot.removeClass("bg-red").addClass("bg-green");
            statusLabel.text("Inside Area").removeClass("text-red").addClass("text-green");
            polyLayer.setStyle({ color: '#2c3e50', fillColor: '#2c3e50' });
            if(polyLayer._path) L.DomUtil.removeClass(polyLayer._path, 'blink-polygon');
            liveMarker.setStyle({ fillColor: '#3498db' });
        } else {
            dot.removeClass("bg-green").addClass("bg-red");
            statusLabel.text("Out of Bounds").removeClass("text-green").addClass("text-red");
            polyLayer.setStyle({ color: '#e74c3c', fillColor: '#e74c3c' });
            if(polyLayer._path) L.DomUtil.addClass(polyLayer._path, 'blink-polygon');
            liveMarker.setStyle({ fillColor: '#e74c3c' });
        }

        map.panTo(newPos, { animate: true });
    }

    // Har 5 second baad real data fetch karein
    setInterval(updateFromRealAPI, 5000);
    updateFromRealAPI(); // First call immediate
});
</script>

</body>
</html>
