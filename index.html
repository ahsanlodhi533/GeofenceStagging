<!DOCTYPE html>
<html>
<head>
    <title>Resource Monitor | Wialon</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" href="favicon_bg.png?v=1">
    <style>
        body { margin:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; }
        #map { height:100vh; width:100%; z-index: 1; }

        /* Left Side Dashboard */
        #side-dashboard {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            width: 320px; max-height: 90vh; display: flex; flex-direction: column;
        }

        .dash-header {
            background: #2c3e50; color: white; padding: 15px;
            border-radius: 12px 12px 0 0; font-weight: bold;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #area-tiles-container {
            background: rgba(255, 255, 255, 0.9); padding: 15px;
            border-radius: 0 0 12px 12px; overflow-y: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #ddd;
        }

        /* Area Tiles Styling */
        .area-tile {
            background: white; border-radius: 8px; padding: 15px; margin-bottom: 12px;
            border-left: 6px solid #bdc3c7; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .tile-header { display: flex; justify-content: space-between; align-items: center; }
        .area-name { font-weight: 800; color: #34495e; font-size: 14px; }
        .device-count { font-weight: bold; font-size: 18px; color: #2c3e50; }
        
        .unit-list { 
            font-size: 11px; color: #7f8c8d; margin-top: 8px; 
            padding-top: 8px; border-top: 1px dashed #eee; font-style: italic;
        }

        /* Status Colors */
        .tile-success { border-left-color: #27ae60 !important; background: #f0fff4; }
        .tile-danger { border-left-color: #e74c3c !important; background: #fff5f5; }

        /* Floating Stats (Right) */
        .stats-box {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: white; padding: 15px; border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 180px;
        }

        /* Animations */
        @keyframes blink-area {
            0% { fill-opacity: 0.1; stroke-width: 2; }
            50% { fill-opacity: 0.4; stroke-width: 5; }
            100% { fill-opacity: 0.1; stroke-width: 2; }
        }
        .blink-polygon { animation: blink-area 1s infinite !important; }

        .pulse-status {
            height: 10px; width: 10px; background: #27ae60; border-radius: 50%;
            display: inline-block; margin-right: 5px;
        }

        /* Area Label Styling */
        .area-label {
            background: #2c3e50 !important;
            border: 1px solid #ffffff !important;
            color: white !important;
            font-weight: bold !important;
            font-size: 13px !important;
            padding: 5px 10px !important;
            border-radius: 6px !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important;
            opacity: 1 !important;
        }

        /* Tooltip ka arrow remove karne ke liye */
        .leaflet-tooltip-pane .area-label::before {
            border-top-color: #2c3e50 !important;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div id="side-dashboard">
    <div class="dash-header">
        <span>Resource Monitor</span>
        <span style="font-size: 10px; background: #3498db; padding: 3px 8px; border-radius: 4px;">WIALON LIVE</span>
    </div>
    <div id="area-tiles-container">
        </div>
</div>

<div class="stats-box">
    <div style="font-size: 12px; color: #666; font-weight: bold; margin-bottom: 5px;">SYSTEM OVERVIEW</div>
    <div style="font-size: 11px; line-height: 1.6;">
        <span class="pulse-status"></span> Total Units: <b id="total-units">0</b><br>
        <span style="color: #e74c3c;">●</span> Alert Zones: <b id="total-alerts" style="color: #e74c3c;">0</b>
    </div>
</div>

<script>
$(document).ready(function(){
    // Madina Initial Position
    var map = L.map('map', { zoomControl: false }).setView([24.492993, 39.65313], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    var areaConfigs = [];
    var areaLayers = {}; 
    var unitMarkers = {}; 

    // API Base URL (Update port if needed)
    var apiBase = "https://jzr-person-tracking-stag.tagntech.com/api/Wialon";

    // 1. Initial Load: Get Config from appsettings via Backend
    function init() {
        $.get(`${apiBase}/get-areas-config`, function(res) {
            if(res.success) {
                areaConfigs = res.data;
                setupUI();

                // --- Naya Code: Saare areas ko screen par fit karne ke liye ---
                var group = new L.featureGroup(Object.values(areaLayers));
                map.fitBounds(group.getBounds(), { padding: [50, 50] });

                startTracking();
            } else {
                console.error("Config load failed:", res.message);
            }
        });
    }

    function setupUI() {
    areaConfigs.forEach(area => {
        // Map: Draw Polygons
        var poly = L.polygon(area.coords, {
            color: area.color, 
            fillColor: area.color, 
            weight: 2, 
            fillOpacity: 0.1
        }).addTo(map);

        // --- UPDATED: Tooltip now only shows on Hover ---
        poly.bindTooltip(area.id, {
            permanent: false,    // Hamesha nahi dikhega
            sticky: true,        // Mouse ke saath move karega
            direction: 'top',    // Mouse ke upar nazar ayega
            className: 'area-label' 
        });

        // Hover Effect: Opacity change logic
        poly.on('mouseover', function (e) {
            this.setStyle({ fillOpacity: 0.4, weight: 4 });
        });
        
        poly.on('mouseout', function (e) {
            var isViolated = $(`#tile-${area.id.replace(/\s+/g, '-')}`).hasClass('tile-danger');
            this.setStyle({ 
                fillOpacity: isViolated ? 0.3 : 0.1, 
                weight: 2 
            });
        });

        areaLayers[area.id] = poly;

        // Sidebar: Add Tiles
        var safeId = area.id.replace(/\s+/g, '-');
        $("#area-tiles-container").append(`
            <div id="tile-${safeId}" class="area-tile">
                <div class="tile-header">
                    <span class="area-name">${area.id}</span>
                    <span class="device-count"><span class="curr">0</span>/${area.minDevicesRequired}</span>
                </div>
                <div class="unit-list">Syncing...</div>
            </div>
        `);
    });
}
    
// 2. Fetch Wialon Units and Match
    function startTracking() {
        setInterval(refreshData, 5000);
        refreshData();
    }

    function refreshData() {
        $.get(`${apiBase}/get-units`, function(res) {
            if(res.success && res.data.items) {
                var allUnits = res.data.items;
                $("#total-units").text(allUnits.length);
                
                var alertsCount = 0;

                areaConfigs.forEach(area => {
                    var activeNamesInside = [];
                    
                    allUnits.forEach(unit => {
                        // Check if this unit is part of the area's target list
                        if(area.targetDeviceNames.includes(unit.nm)) {
                            if(unit.pos && isInside(unit.pos.y, unit.pos.x, areaLayers[area.id])) {
                                activeNamesInside.push(unit.nm);
                            }
                            updateMarker(unit);
                        }
                    });

                    // Update UI for this area
                    var isAlert = activeNamesInside.length < area.minDevicesRequired;
                    if(isAlert) alertsCount++;
                    updateAreaVisuals(area, activeNamesInside, isAlert);
                });

                $("#total-alerts").text(alertsCount);
            }
        });
    }

    function updateAreaVisuals(area, unitsInside, isAlert) {
        var safeId = area.id.replace(/\s+/g, '-');
        var tile = $(`#tile-${safeId}`);
        var poly = areaLayers[area.id];

        tile.find('.curr').text(unitsInside.length);
        tile.find('.unit-list').html(unitsInside.length > 0 
            ? "<b>Active:</b> " + unitsInside.join(", ") 
            : "No required persons present");

        if(isAlert) {
            tile.addClass('tile-danger').removeClass('tile-success');
            poly.setStyle({ color: '#e74c3c', fillColor: '#e74c3c', fillOpacity: 0.3 });
            if(poly._path) L.DomUtil.addClass(poly._path, 'blink-polygon');
        } else {
            tile.addClass('tile-success').removeClass('tile-danger');
            poly.setStyle({ color: area.color, fillColor: area.color, fillOpacity: 0.1 });
            if(poly._path) L.DomUtil.removeClass(poly._path, 'blink-polygon');
        }
    }

    function updateMarker(unit) {
        var pos = [unit.pos.y, unit.pos.x];
        if(!unitMarkers[unit.nm]) {
            unitMarkers[unit.nm] = L.circleMarker(pos, {
                radius: 7, color: '#fff', weight: 2, fillColor: '#3498db', fillOpacity: 1
            }).addTo(map).bindPopup(`<b>${unit.nm}</b>`);
        } else {
            unitMarkers[unit.nm].setLatLng(pos);
        }
    }

    // Mathematical Inside/Outside Check
    function isInside(lat, lng, poly) {
        var polyPoints = poly.getLatLngs()[0];
        var x = lat, y = lng;
        var inside = false;
        for (var i = 0, j = polyPoints.length - 1; i < polyPoints.length; j = i++) {
            var xi = polyPoints[i].lat, yi = polyPoints[i].lng;
            var xj = polyPoints[j].lat, yj = polyPoints[j].lng;
            var intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
            if (intersect) inside = !inside;
        }
        return inside;
    }

    init();
});
</script>

</body>
</html>
