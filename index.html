<!DOCTYPE html>
<html>
<head>
    <title>Resource Monitor | Wialon</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" href="favicon_bg.png?v=1">
    <style>
        body { margin:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; }
        #map { height:100vh; width:100%; z-index: 1; }

        /* Left Side Dashboard */
        #side-dashboard {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            width: 320px; max-height: 90vh; display: flex; flex-direction: column;
        }

        .dash-header {
            background: #2c3e50; color: white; padding: 15px;
            border-radius: 12px 12px 0 0; font-weight: bold;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #area-tiles-container {
            background: rgba(255, 255, 255, 0.9); padding: 15px;
            border-radius: 0 0 12px 12px; overflow-y: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #ddd;
        }

        /* Area Tiles Styling */
        .area-tile {
            background: white; border-radius: 8px; padding: 15px; margin-bottom: 12px;
            border-left: 6px solid #bdc3c7; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .tile-header { display: flex; justify-content: space-between; align-items: center; }
        .area-name { font-weight: 800; color: #34495e; font-size: 14px; }
        .device-count { font-weight: bold; font-size: 18px; color: #2c3e50; }
        
        .unit-list { 
            font-size: 11px; color: #7f8c8d; margin-top: 8px; 
            padding-top: 8px; border-top: 1px dashed #eee; font-style: italic;
        }

        /* Status Colors */
        .tile-success { border-left-color: #27ae60 !important; background: #f0fff4; }
        .tile-danger { border-left-color: #e74c3c !important; background: #fff5f5; }

        /* Floating Stats (Right) */
        .stats-box {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: white; padding: 15px; border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 180px;
        }

        /* Animations */
        @keyframes blink-area {
            0% { fill-opacity: 0.1; stroke-width: 2; }
            50% { fill-opacity: 0.4; stroke-width: 5; }
            100% { fill-opacity: 0.1; stroke-width: 2; }
        }
        .blink-polygon { animation: blink-area 1s infinite !important; }

        .pulse-status {
            height: 10px; width: 10px; background: #27ae60; border-radius: 50%;
            display: inline-block; margin-right: 5px;
        }

        /* Area Label Styling */
        .area-label {
            background: #2c3e50 !important;
            border: 1px solid #ffffff !important;
            color: white !important;
            font-weight: bold !important;
            font-size: 13px !important;
            padding: 5px 10px !important;
            border-radius: 6px !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important;
            opacity: 1 !important;
        }

        /* Tooltip ka arrow remove karne ke liye */
        .leaflet-tooltip-pane .area-label::before {
            border-top-color: #2c3e50 !important;
        }

        /* Reset View Button Styling */
#reset-map-btn {
    position: absolute;
    top: 20px;
    right: 220px; /* Stats box ke saath adjust kiya hai */
    z-index: 1000;
    background: rgba(255, 255, 255, 0.9);
    border: 1px solid #ddd;
    padding: 8px 15px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 12px;
    display: none; /* Default mein hidden rahega */
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
#reset-map-btn:hover { background: #2c3e50; color: white; }
    </style>
</head>
<body>

<div id="map"></div>
<button id="reset-map-btn" onclick="resetMapFocus()">⟲ Reset View</button>
<div id="side-dashboard">
    <div class="dash-header">
        <span>Resource Monitor</span>
        <span style="font-size: 10px; background: #3498db; padding: 3px 8px; border-radius: 4px;">WIALON LIVE</span>
    </div>
    <div id="area-tiles-container">
        </div>
</div>

<div class="stats-box">
    <div style="font-size: 12px; color: #666; font-weight: bold; margin-bottom: 5px;">SYSTEM OVERVIEW</div>
    <div style="font-size: 11px; line-height: 1.6;">
        <span class="pulse-status"></span> Total Zones: <b id="total-zones">0</b><br>
        <span style="color: #e74c3c;">●</span> Alert Zones: <b id="total-alerts" style="color: #e74c3c;">0</b>
    </div>
</div>

<script>
// Global variables taake har function ko access milay
var map;
var areaConfigs = [];
var areaLayers = {}; 
var unitMarkers = {}; 
var apiBase = "https://jzr-person-tracking-stag.tagntech.com/api/Wialon";

$(document).ready(function(){
    // 1. Initialize Map
    map = L.map('map', { zoomControl: false }).setView([24.492993, 39.65313], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // 2. Load Data
    init();

    function init() {
        $.get(`${apiBase}/get-areas-config`, function(res) {
            if(res.success) {
                areaConfigs = res.data;
                setupUI();
                startTracking();
            }
        });
    }

    function setupUI() {
    console.log("Drawing Geofences...", areaConfigs);
    $("#area-tiles-container").empty();
    
    if(!areaConfigs || areaConfigs.length === 0) return;

    areaConfigs.forEach(area => {
        var minReq = area.minUnitsRequired || 0;
        var color = area.color || '#3498db';
        var areaId = area.id;
        var shape = null;
        var areaAddress = area.address || "No description available";

        try {
            // Polygon handling (Type 2)
            if (area.points && area.points.length > 0) {
                // WIALON FIX: y = Latitude, x = Longitude
                var leafletCoords = area.points.map(p => {
                    return L.latLng(parseFloat(p.y), parseFloat(p.x));
                });
                
                shape = L.polygon(leafletCoords, { 
                    color: color, fillColor: color, weight: 3, fillOpacity: 0.3 
                }).addTo(map);
            } 
            // Circle handling (Type 3) - Agar center object ho to
            else if (area.center && (area.center.y || area.center.lat)) {
                var lat = area.center.y || area.center.lat;
                var lng = area.center.x || area.center.lng;
                
                shape = L.circle([parseFloat(lat), parseFloat(lng)], {
                    radius: parseInt(area.width) || 50,
                    color: color, fillColor: color, weight: 3, fillOpacity: 0.3
                }).addTo(map);
            }

            if (shape) {
                shape.bindTooltip(area.name, { sticky: true, className: 'area-label' });
                areaLayers[areaId] = shape;
            }
        } catch (err) {
            console.error("Error drawing area:", area.name, err);
        }

        // --- Tile Generation ---
        var safeId = "area-" + areaId;
        $("#area-tiles-container").append(`
            <div id="tile-${safeId}" class="area-tile" style="cursor:pointer">
                <div class="tile-header">
                    <div style="display: flex; flex-direction: column;">
                        <span class="area-name">${area.name}</span>
                        <span style="font-size: 10px; color: #95a5a6; margin-top: 2px;">${areaAddress}</span>
                    </div>
                    <span class="device-count">
                        <span class="curr">0</span>/<span class="req">${minReq}</span>
                    </span>
                </div>
                <div class="unit-list">Scanning...</div>
            </div>
        `);

        // Tile click zoom logic (Jo pehle discuss hui thi)
        $(document).off('click', `#tile-${safeId}`).on('click', `#tile-${safeId}`, function() {
            var layer = areaLayers[areaId];
            if (layer) {
                if (layer instanceof L.Circle) {
                    map.setView(layer.getLatLng(), 17, { animate: true });
                } else {
                    map.fitBounds(layer.getBounds(), { padding: [40, 40], animate: true });
                }
                $("#reset-map-btn").fadeIn();
            }
        });
    });

    // Sare areas draw hone ke baad map focus karein
    var layerArray = Object.values(areaLayers);
    if(layerArray.length > 0) {
        var group = new L.featureGroup(layerArray);
        map.fitBounds(group.getBounds(), { padding: [50, 50] });
    }
}

    function startTracking() {
        setInterval(refreshData, 5000);
        refreshData();
    }

    function refreshData() {
        $.get(`${apiBase}/get-units`, function(res) {
            if(res.success && res.data && res.data.items) {
                var allUnits = res.data.items; 
                $("#total-zones").text(areaConfigs.length);
                var alertsCount = 0;

                areaConfigs.forEach(area => {
                    var activeUnitsInThisArea = [];
                    var layer = areaLayers[area.id];
                    
                    allUnits.forEach(unit => {
                        if(unit && unit.pos && layer) {
                            if(isInside(unit.pos.y, unit.pos.x, layer)) {
                                activeUnitsInThisArea.push(unit.nm);
                            }
                            updateMarker(unit);
                        }
                    });

                    var minReq = area.minUnitsRequired || 0;
                    var isAlert = activeUnitsInThisArea.length < minReq;
                    if(isAlert) alertsCount++;
                    
                    updateAreaVisuals(area, activeUnitsInThisArea, isAlert);
                });
                $("#total-alerts").text(alertsCount);
            }
        });
    }

    function updateAreaVisuals(area, unitsInside, isAlert) {
        var safeId = "area-" + area.id;
        var tile = $(`#tile-${safeId}`);
        var layer = areaLayers[area.id];

        if(!tile.length || !layer) return;

        tile.find('.curr').text(unitsInside.length);
        tile.find('.unit-list').html(unitsInside.length > 0 
            ? "<b>Units:</b> " + unitsInside.join(", ") 
            : "No units present");

        if(isAlert) {
            tile.addClass('tile-danger').removeClass('tile-success');
            layer.setStyle({ color: '#e74c3c', fillColor: '#e74c3c', fillOpacity: 0.4 });
            $(layer._path).addClass('blink-polygon'); // CSS Animation
        } else {
            tile.addClass('tile-success').removeClass('tile-danger');
            layer.setStyle({ color: area.color, fillColor: area.color, fillOpacity: 0.1 });
            $(layer._path).removeClass('blink-polygon');
        }
    }

    function updateMarker(unit) {
        var pos = [unit.pos.y, unit.pos.x];
        if(!unitMarkers[unit.nm]) {
            unitMarkers[unit.nm] = L.circleMarker(pos, {
                radius: 6, color: '#fff', weight: 2, fillColor: '#3498db', fillOpacity: 1
            }).addTo(map).bindPopup(`<b>${unit.nm}</b>`);
        } else {
            unitMarkers[unit.nm].setLatLng(pos);
        }
    }

    function isInside(lat, lng, layer) {
        if (!layer) return false;

        // 1. Circle Check
        if (layer instanceof L.Circle) {
            var distance = map.distance([lat, lng], layer.getLatLng());
            return distance <= layer.getRadius();
        }

        // 2. Polygon Check
        if (layer instanceof L.Polygon) {
            var pt = L.latLng(lat, lng);
            var polyPoints = layer.getLatLngs()[0];
            var x = pt.lat, y = pt.lng;
            var inside = false;
            for (var i = 0, j = polyPoints.length - 1; i < polyPoints.length; j = i++) {
                var xi = polyPoints[i].lat, yi = polyPoints[i].lng;
                var xj = polyPoints[j].lat, yj = polyPoints[j].lng;
                var intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }
        return false;
    }
});
</script>

</body>
</html>
